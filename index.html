function imgEl(src, texClass, style="") {
  const id = "img_" + Math.random().toString(36).substr(2,6);

// HELPERS
function el(tag, props={}, ...children) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k,v]) => {
    if(k==="style" && typeof v==="object") Object.assign(e.style, v);
    else if(k==="className") e.className=v;
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c => {
    if(c===null||c===undefined) return;
    e.appendChild(typeof c==="string"||typeof c==="number" ? document.createTextNode(c) : c);
  });
  return e;
}

function div(props,...children){return el("div",props,...children);}
function span(props,...children){return el("span",props,...children);}
function img2(src,tex,w,h){
  const i=document.createElement("img");
  i.src=src; i.referrerPolicy="no-referrer"; i.crossOrigin="anonymous";
  Object.assign(i.style,{width:w,height:h,objectFit:"cover",display:"block",flexShrink:0});
  i.onerror=()=>{const d=document.createElement("div");d.className=tex;Object.assign(d.style,{width:w,height:h,flexShrink:0});i.parentNode&&i.parentNode.replaceChild(d,i);};
  return i;
}
function secTitle(t){return div({className:"sec-title"},t);}

function btnOutline(text,href){return el("a",{className:"btn-outline",href},text);}

function renderContact(){

    sw.appendChild(div({style:{width:"64px",height:"64px",background:`${OG}20`,borderRadius:"99px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"28px",margin:"0 auto 16px"}},"✅"));

  hero.appendChild(div({style:{position:"absolute",inset:"0",background:"rgba(0,0,0,.78)",display:"flex",flexDirection:"column",justifyContent:"center",padding:"0 16px"}}));
  const hov=hero.lastChild;
  hov.appendChild(div({style:{color:GD,fontSize:"9px",fontWeight:"700",letterSpacing:"2px",marginBottom:"4px"}},"BOOK A FREE SITE VISIT"));
  hov.appendChild(div({style:{color:"#fff",fontSize:"16px",fontWeight:"900"}},"Request a Quote"));

  const wrap=div({style:{padding:"14px"}});
  wrap.appendChild(hero);

  if(state.basket.length>0){
    const bk=div({style:{background:"#101010",borderRadius:"8px",padding:"12px",marginBottom:"14px",border:`1px solid ${OG}35`}});

      const br=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #141414"}});

      bt.appendChild(div({style:{color:"#fff",fontSize:"11px",fontWeight:"700"}},b.name));

      br.appendChild(bt);
      const rb=el("button",{style:{background:"none",border:"none",color:"#333",fontSize:"20px",cursor:"pointer",lineHeight:"1"},onClick:()=>setState({basket:state.basket.filter(x=>x.name!==b.name)})},"\u00d7");
      br.appendChild(rb);
      bk.appendChild(br);
    });
    wrap.appendChild(bk);
  }

  function fldLabel(t){const l=document.createElement("label");l.className="form-label";l.textContent=t;return l;}
  function fldInput(ph,key,type="text"){
    const i=el("input",{type,className:"form-input",placeholder:ph});

  }

  sel.value=state.form.space||"";

  wrap.appendChild(ta);

  wrap.appendChild(btnPrimary("SUBMIT REQUEST →",()=>{
    if(!state.form.name||!state.form.phone){alert("Please enter name & phone.");return;}
    setState({sent:true});
  }));

  const ct=div({style:{background:"#101010",borderRadius:"8px",padding:"13px",marginTop:"10px",border:"1px solid #1A1A1A",textAlign:"center"}});
  ct.appendChild(div({style:{color:"#444",fontSize:"9px",fontWeight:"800",letterSpacing:"1.5px",marginBottom:"6px"}},"PREFER TO CALL?"));
  ct.appendChild(el("a",{href:"tel:80035667",style:{color:OG,fontSize:"17px",fontWeight:"900",textDecoration:"none"}},"📞 800 Floor (35667)"));
  ct.appendChild(div({style:{color:"#333",fontSize:"9px",marginTop:"4px"}},"Toll Free · Dubai, UAE"));
  wrap.appendChild(ct);
  frag.appendChild(wrap);
  return frag;
}

// RENDER
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  // Header
  const hdr=div({className:"header"});
  const hl=div({style:{display:"flex",alignItems:"center",gap:"7px"}});
  if(state.prod||state.sub||state.cat){
    const bk=el("button",{style:{background:"none",border:"none",color:OG,fontSize:"26px",cursor:"pointer",lineHeight:"1",paddingRight:"3px"},onClick:()=>{
      if(state.prod) setState({prod:null});
      else if(state.sub) setState({sub:null});
      else setState({cat:null});
    }},"‹");
    hl.appendChild(bk);
  }
  hl.appendChild(logoCompact());
  hdr.appendChild(hl);
  const hr=div({style:{display:"flex",gap:"7px",alignItems:"center"}});
  if(state.basket.length>0){
    const bb=el("button",{style:{background:"#101010",border:"1px solid #2A2A2A",color:OG,borderRadius:"20px",padding:"5px 11px",fontSize:"10px",fontWeight:"700",cursor:"pointer"},onClick:()=>setState({tab:"contact",cat:null,sub:null,prod:null})},`🧺 ${state.basket.length}`);
    hr.appendChild(bb);
  }
  hr.appendChild(el("a",{href:"tel:80035667",style:{background:OG,color:"#fff",padding:"6px 14px",borderRadius:"20px",fontSize:"10px",fontWeight:"800",textDecoration:"none"}},"📞 800 FLOOR"));
  hdr.appendChild(hr);
  app.appendChild(hdr);

  // Content
  let content;
  if(state.tab==="home"&&!state.cat) content=renderHome();
  else if(state.tab==="catalog"&&!state.cat) content=renderCatalog();
  else if(state.cat&&!state.sub&&!state.prod) content=renderCatPage(state.cat);
  else if(state.cat&&state.sub&&!state.prod) content=renderSubPage(state.sub,state.cat);
  else if(state.cat&&state.sub&&state.prod) content=renderProdPage(state.prod,state.cat,state.sub);
  else if(state.tab==="services") content=renderServices();
  else if(state.tab==="about") content=renderAbout();
  else if(state.tab==="contact") content=renderContact();
  if(content) app.appendChild(content);

  // Bottom Nav
  const nav=div({className:"bottom-nav"});
  [["home","🏠","HOME"],["catalog","📋","CATALOG"],["services","🔨","SERVICES"],["about","ℹ️","ABOUT"],["contact","📝","REQUEST"]].forEach(([id,ic,lb])=>{
    const nb=el("button",{className:"nav-btn"+(state.tab===id?" active":""),onClick:()=>{
      setState({tab:id,cat:null,sub:null,prod:null});
    }});
    nb.appendChild(div({className:"nav-icon"},ic));
    nb.appendChild(document.createTextNode(lb));
    if(id==="contact"&&state.basket.length>0) nb.appendChild(div({className:"nav-dot"}));
    nav.appendChild(nb);
  });
  app.appendChild(nav);
}

render();
</script>
