    .app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:68px;position:relative;}
    .header{background:rgba(7,7,7,.97);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;border-bottom:1px solid #1A1A1A;}
    .logo-compact{display:flex;align-items:center;gap:8px;}
    .logo-badge{background:#E87722;border-radius:4px;padding:3px 7px;color:#fff;font-weight:900;font-size:13px;letter-spacing:1px;}

    .logo-banner{background:#E87722;padding:10px 14px 8px;}
    .logo-banner img{height:48px;max-width:100%;object-fit:contain;object-position:left;}
    .logo-tagline{color:rgba(0,0,0,.52);font-size:8.5px;font-weight:700;letter-spacing:1.6px;margin-top:4px;}
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(5,5,5,.98);border-top:1px solid #1A1A1A;display:flex;z-index:300;}
    .nav-btn{flex:1;background:none;border:none;color:#444;padding:9px 0 6px;cursor:pointer;font-size:8px;font-weight:500;letter-spacing:.5px;font-family:'Oswald',sans-serif;transition:color .2s;}
    .nav-btn.active{color:#E87722;font-weight:900;}
    .nav-icon{font-size:18px;margin-bottom:2px;}
    .nav-dot{background:#E87722;border-radius:99px;width:5px;height:5px;margin:2px auto 0;}
    .usp-bar{background:#E87722;display:flex;overflow-x:auto;}
    .usp-item{padding:8px 15px;font-size:10px;font-weight:800;color:#fff;white-space:nowrap;border-right:1px solid rgba(255,255,255,.2);}
    .card{background:#101010;border-radius:8px;border:1px solid #1C1C1C;overflow:hidden;}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .btn-primary{width:100%;background:#E87722;border:none;color:#fff;padding:14px;border-radius:8px;font-size:13px;font-weight:900;cursor:pointer;letter-spacing:.5px;font-family:'Oswald',sans-serif;}
    .btn-outline{display:block;text-align:center;margin:9px 0 0;border:1.5px solid #E87722;color:#E87722;padding:13px;border-radius:8px;font-size:12px;font-weight:800;text-decoration:none;}
    img.floor-img{object-fit:cover;display:block;}
    .tex-wood{background:repeating-linear-gradient(0deg,#9B7030 0px,#9B7030 22px,#7A5020 22px,#7A5020 44px,#8B6528 44px,#8B6528 66px,#6B4515 66px,#6B4515 88px);}
    .tex-lam{background:repeating-linear-gradient(0deg,#AA8545 0px,#AA8545 22px,#906B35 22px,#906B35 44px,#BA9558 44px,#BA9558 66px);}
    .tex-vinyl{background:repeating-linear-gradient(0deg,#5A7A90 0px,#5A7A90 20px,#4A6A80 20px,#4A6A80 40px,#6A8AA2 40px,#6A8AA2 60px);}
    .tex-spc{background:repeating-linear-gradient(0deg,#787878 0px,#787878 22px,#686868 22px,#686868 44px);}
    .tex-carpet{background:repeating-linear-gradient(0deg,#6A5848 0px,#6A5848 20px,#5A4838 20px,#5A4838 40px);}
    .tex-out{background:repeating-linear-gradient(0deg,#6A5030 0px,#6A5030 32px,#5A4020 32px,#5A4020 64px);}
    .tex-acc{background:repeating-linear-gradient(0deg,#383838 0px,#383838 20px,#282828 20px,#282828 40px);}
    .tex-dark{background:repeating-linear-gradient(0deg,#1A2530 0px,#1A2530 22px,#101820 22px,#101820 44px);}
    .tex-clear{background:repeating-linear-gradient(0deg,#C45000 0px,#C45000 24px,#A84000 24px,#A84000 48px);}
    .sec-title{color:#444;font-size:9px;font-weight:800;letter-spacing:2.5px;margin-bottom:12px;text-transform:uppercase;}
    .spec-chip{background:#181818;border-radius:5px;padding:5px 9px;border:1px solid #1C1C1C;}
    .spec-key{color:#444;font-size:8px;letter-spacing:1px;text-transform:uppercase;}
    .spec-val{color:#ccc;font-size:10px;font-weight:700;margin-top:1px;}
    .brand-tag{background:#181818;border:1px solid #222;border-radius:4px;padding:4px 12px;font-size:10px;color:#bbb;font-weight:600;}
    .form-input{width:100%;background:#111;border:1px solid #1E1E1E;border-radius:8px;padding:12px 14px;color:#fff;font-size:13px;margin-bottom:10px;outline:none;font-family:'Open Sans',sans-serif;}

// HELPERS
function el(tag,props={},...children){
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k==="className") e.className=v;
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c===null||c===undefined) return;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return e;
}
function div(props,...c){return el("div",props,...c);}
function span(props,...c){return el("span",props,...c);}

function img2(src,tex,w,h){
  const i=document.createElement("img");
  i.src=src;
  Object.assign(i.style,{width:w,height:h,objectFit:"cover",display:"block",flexShrink:"0"});
  i.onerror=()=>{
    const d=document.createElement("div");
    d.className=tex;
    Object.assign(d.style,{width:w,height:h,flexShrink:"0"});
    i.parentNode&&i.parentNode.replaceChild(d,i);
  };
  return i;
}

function btnPrimary(text,onClick){return el("button",{className:"btn-primary",onClick},text);}
function btnOutline(text,href){return el("a",{className:"btn-outline",href},text);}

  wrap.appendChild(ta);
  wrap.appendChild(btnPrimary("SUBMIT REQUEST →",()=>{
    if(!state.form.name||!state.form.phone){alert("Please enter name & phone.");return;}
    setState({sent:true});
  }));
  const ct=div({style:{background:"#101010",borderRadius:"8px",padding:"13px",marginTop:"10px",border:"1px solid #1A1A1A",textAlign:"center"}});
  ct.appendChild(div({style:{color:"#444",fontSize:"9px",fontWeight:"800",letterSpacing:"1.5px",marginBottom:"6px"}},"PREFER TO CALL?"));
  ct.appendChild(el("a",{href:"tel:80035667",style:{color:OG,fontSize:"17px",fontWeight:"900",textDecoration:"none"}},"📞 800 Floor (35667)"));
  ct.appendChild(div({style:{color:"#333",fontSize:"9px",marginTop:"4px"}},"Toll Free · Dubai, UAE"));
  wrap.appendChild(ct);
  frag.appendChild(wrap);
  return frag;
}

// ── RENDER ──
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  const hdr=div({className:"header"});
  const hl=div({style:{display:"flex",alignItems:"center",gap:"7px"}});
  if(state.prod||state.sub||state.cat){
    hl.appendChild(el("button",{style:{background:"none",border:"none",color:OG,fontSize:"26px",cursor:"pointer",lineHeight:"1",paddingRight:"3px"},onClick:()=>{
      if(state.prod) setState({prod:null});
      else if(state.sub) setState({sub:null});
      else setState({cat:null});
    }},"‹"));
  }
  hl.appendChild(logoCompact());
  hdr.appendChild(hl);
  const hr=div({style:{display:"flex",gap:"7px",alignItems:"center"}});
  if(state.basket.length>0){
    hr.appendChild(el("button",{style:{background:"#101010",border:"1px solid #2A2A2A",color:OG,borderRadius:"20px",padding:"5px 11px",fontSize:"10px",fontWeight:"700",cursor:"pointer"},onClick:()=>setState({tab:"contact",cat:null,sub:null,prod:null})},`🧺 ${state.basket.length}`));
  }
  hr.appendChild(el("a",{href:"tel:80035667",style:{background:OG,color:"#fff",padding:"6px 14px",borderRadius:"20px",fontSize:"10px",fontWeight:"800",textDecoration:"none"}},"📞 800 FLOOR"));
  hdr.appendChild(hr);
  app.appendChild(hdr);
  let content;
  if(state.tab==="home"&&!state.cat) content=renderHome();
  else if(state.tab==="catalog"&&!state.cat) content=renderCatalog();
  else if(state.cat&&!state.sub&&!state.prod) content=renderCatPage(state.cat);
  else if(state.cat&&state.sub&&!state.prod) content=renderSubPage(state.sub,state.cat);
  else if(state.cat&&state.sub&&state.prod) content=renderProdPage(state.prod,state.cat,state.sub);
  else if(state.tab==="services") content=renderServices();
  else if(state.tab==="about") content=renderAbout();
  else if(state.tab==="contact") content=renderContact();
  if(content) app.appendChild(content);
  const nav=div({className:"bottom-nav"});
  [["home","🏠","HOME"],["catalog","📋","CATALOG"],["services","🔨","SERVICES"],["about","ℹ️","ABOUT"],["contact","📝","REQUEST"]].forEach(([id,ic,lb])=>{
    const nb=el("button",{className:"nav-btn"+(state.tab===id?" active":""),onClick:()=>setState({tab:id,cat:null,sub:null,prod:null})});
    nb.appendChild(div({className:"nav-icon"},ic));
    nb.appendChild(document.createTextNode(lb));
    if(id==="contact"&&state.basket.length>0) nb.appendChild(div({className:"nav-dot"}));
    nav.appendChild(nb);
  });
  app.appendChild(nav);
}

render();
</script>
</body>
</html>
